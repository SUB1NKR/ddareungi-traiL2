<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>자전거로 만나는 서울, 따릉이길</title>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- 로딩화면 -->
  <!-- 처음부터 팝업 뒤에 깔려 있어야 하므로 main보다 위에 둡니다. -->
  <section id="loading" class="loading-page" aria-label="따릉이 트레일 로딩화면">
    <div class="safety-slide active">
      <img src="./assets/safety/safety-01.png" alt="따릉이 안전수칙 1" />
    </div>

    <div class="safety-slide">
      <img src="./assets/safety/safety-02.png" alt="따릉이 안전수칙 2" />
    </div>

    <div class="safety-slide">
      <img src="./assets/safety/safety-03.png" alt="따릉이 안전수칙 3" />
    </div>

    <div class="loading-track" aria-hidden="true">
      <div class="loading-fill"></div>

      <img
        class="loading-bike"
        src="./assets/icons/bike-loading.png"
        alt=""
      />
    </div>
  </section>

  <!-- 적응형 안내 팝업 -->
  <section id="adaptivePopup" class="adaptive-popup" aria-label="화면 최적화 안내">
    <div class="popup-dim"></div>

    <div class="popup-card" role="dialog" aria-modal="true">
      <p class="popup-label">자전거로 만나는 서울, 따릉이길</p>

      <h1>
        1920×980 화면에<br />
        최적화되어 있습니다
      </h1>

      <p class="popup-description">
        본 웹사이트는 데스크톱 1920×980 해상도 기준으로 제작되었습니다.
        더 안정적인 감상을 위해 데스크톱 환경에서 감상해주세요.
      </p>

      <button id="startButton" class="popup-button" type="button">
        확인하고 입장하기
      </button>
    </div>
  </section>

  <!-- 메인화면 임시 -->
  <main id="main" class="main-page">
    <h1>
      서울을 달리는<br />
      새로운 방법
    </h1>
    <p>따릉이 트레일</p>
  </main>

  <script src="./script.js"></script>
</body>
</html>
