<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>따릉이 트레일</title>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- 적응형 안내 화면 -->
  <section id="adaptiveNotice" class="adaptive-notice">
    <div class="notice-card">
      <p class="notice-label">DDARUENGI TRAIL</p>
      <h1>
        이 웹사이트는<br />
        1920×980 화면에 최적화되어 있습니다.
      </h1>
      <p class="notice-description">
        더 안정적인 감상을 위해 데스크톱 전체 화면 환경에서 이용해주세요.
        현재 화면에서도 계속 볼 수 있지만, 일부 요소의 위치가 다르게 보일 수 있습니다.
      </p>

      <button id="noticeStartButton" class="notice-button" type="button">
        확인하고 입장하기
      </button>
    </div>
  </section>

  <!-- 로딩화면 -->
  <section id="loading" class="loading-page">
    <div class="safety-slide active">
      <img src="./assets/safety/safety-01.png" alt="따릉이 안전수칙 1" />
    </div>

    <div class="safety-slide">
      <img src="./assets/safety/safety-02.png" alt="따릉이 안전수칙 2" />
    </div>

    <div class="safety-slide">
      <img src="./assets/safety/safety-03.png" alt="따릉이 안전수칙 3" />
    </div>

    <div class="loading-track">
      <div class="loading-fill"></div>

      <img
        class="loading-bike"
        src="./assets/icons/bike-loading.png"
        alt="로딩 중인 따릉이 자전거"
      />
    </div>
  </section>

  <!-- 메인화면 임시 -->
  <main id="main" class="main-page">
    <h1>서울을 달리는<br />새로운 방법</h1>
    <p>따릉이 트레일</p>
  </main>

  <script src="./script.js"></script>
</body>
</html>
