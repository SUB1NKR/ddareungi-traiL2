<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>따릉이 트레일</title>

  <link rel="stylesheet" href="./style.css" />
</head>

<body>
  <!-- 로딩화면 -->
  <section id="loading" class="loading-page" aria-label="따릉이 트레일 로딩화면">
    <div class="safety-slide active">
      <img src="./assets/safety/safety-01.png" alt="따릉이 안전수칙 1" />
    </div>

    <div class="safety-slide">
      <img src="./assets/safety/safety-02.png" alt="따릉이 안전수칙 2" />
    </div>

    <div class="safety-slide">
      <img src="./assets/safety/safety-03.png" alt="따릉이 안전수칙 3" />
    </div>

    <p class="loading-text" aria-label="Loading">
      <span style="--i: 0">L</span>
      <span style="--i: 1">o</span>
      <span style="--i: 2">a</span>
      <span style="--i: 3">d</span>
      <span style="--i: 4">i</span>
      <span style="--i: 5">n</span>
      <span style="--i: 6">g</span>
      <span style="--i: 7">.</span>
      <span style="--i: 8">.</span>
      <span style="--i: 9">.</span>
    </p>

    <div class="loading-track" aria-hidden="true">
      <div id="loadingFill" class="loading-fill"></div>
    </div>
  </section>

  <!-- 안내 팝업 -->
  <section id="adaptivePopup" class="adaptive-popup" aria-label="화면 최적화 안내">
    <div class="popup-dim"></div>

    <div class="popup-card" role="dialog" aria-modal="true">
      <p class="popup-label">자전거로 만나는 서울, 따릉이길</p>

      <h1>
        원활한 감상을 위해<br />
        크롬 브라우저에서 실행해주세요.
      </h1>

      <p class="popup-description">
        본 웹사이트는 크롬 브라우저와 데스크톱 환경에 맞춰 제작되었습니다.
        화면 크기와 브라우저에 따라 일부 인터랙션이 다르게 보일 수 있습니다.
      </p>

      <button id="startButton" class="popup-button" type="button">
        확인하고 입장하기
      </button>
    </div>
  </section>

  <!-- 상단 GNB -->
  <header id="gnb" class="site-gnb" aria-label="상단 메뉴">
    <a href="#main" class="gnb-logo" aria-label="따릉이 트레일 홈">
      <img src="./assets/icons/ddareungi-logo.png" alt="따릉이 트레일" />
    </a>

    <button id="menuButton" class="gnb-menu-button" type="button" aria-label="메뉴 열기">
      <span></span>
      <span></span>
      <span></span>
    </button>
  </header>

  <!-- 메뉴 화면 -->
  <section id="menuPanel" class="menu-panel" aria-label="전체 메뉴">
    <nav class="menu-nav" aria-label="주요 메뉴">
      <a href="#main" class="menu-link" data-home-link style="--i: 0">홈</a>
      <a href="./course.html" class="menu-link" style="--i: 1">20코스 안내</a>
      <a href="./find-course.html" class="menu-link" style="--i: 2">나만의 코스 찾기</a>
    </nav>

    <div class="menu-icon-list" aria-label="외부 링크">
      <a
        href="https://www.facebook.com/seoulbike"
        target="_blank"
        rel="noopener noreferrer"
        class="menu-sns-link"
        style="--i: 3"
      >
        <img src="./assets/icons/menu-icon-01.png" alt="서울자전거 페이스북" />
      </a>

      <a
        href="https://www.instagram.com/seoulbike_/"
        target="_blank"
        rel="noopener noreferrer"
        class="menu-sns-link"
        style="--i: 2"
      >
        <img src="./assets/icons/menu-icon-02.png" alt="서울자전거 인스타그램" />
      </a>

      <a
        href="https://blog.naver.com/2seoulbike"
        target="_blank"
        rel="noopener noreferrer"
        class="menu-sns-link"
        style="--i: 1"
      >
        <img src="./assets/icons/menu-icon-03.png" alt="서울자전거 블로그" />
      </a>

      <a
        href="https://www.youtube.com/@seoulbike_"
        target="_blank"
        rel="noopener noreferrer"
        class="menu-sns-link"
        style="--i: 0"
      >
        <img src="./assets/icons/menu-icon-04.png" alt="서울자전거 유튜브" />
      </a>
    </div>

    <p class="menu-copyright">
      COPYRIGHT ⓒ 2026 1_je0.in_ All RIGHTS RESERVED.
    </p>
  </section>

  <!-- 메인화면 -->
  <main id="main" class="main-page">
    <section class="hero-section">
      <div class="hero-text">
        <h1>
          서울을 달리는<br />
          새로운 방법
        </h1>

        <p>따릉이 트레일</p>
      </div>

      <div id="scrollGuide" class="scroll-guide" aria-hidden="true">
        <div class="scroll-guide-card">
          <p class="scroll-guide-title">스크롤로 여행을 시작해볼까요?</p>
          <p class="scroll-guide-subtitle">아래로 내려 따릉이길을 만나보세요</p>

          <div class="scroll-guide-arrow"></div>
        </div>
      </div>
    </section>

    <section class="dummy-section">
      <p>다음 섹션 영역입니다.</p>
    </section>
  </main>

  <script src="./script.js"></script>
</body>
</html>
